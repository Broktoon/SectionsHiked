<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SectionsHiked</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body class="app-page">

  <!-- Shown while the session check runs -->
  <div id="app-loading" class="app-loading">
    <div class="loading-spinner"></div>
  </div>

  <!-- Main app shell — revealed after auth check passes -->
  <div id="app-shell" class="hidden">

    <header class="app-header">
      <div class="container">
        <div class="logo">SectionsHiked</div>
        <nav class="app-nav">
          <span id="username-label" class="username-label"></span>
          <button id="signout-btn" class="btn btn-outline btn-sm" type="button">Sign Out</button>
        </nav>
      </div>
    </header>

    <!-- Dashboard view (default) -->
    <div id="dashboard-view">
      <div class="container">
        <h2 class="dashboard-heading">Your Trails</h2>
        <div id="trail-grid" class="trail-grid"></div>
      </div>
    </div>

    <!-- Map view — hidden until a trail card is clicked -->
    <div id="map-view" class="hidden">

      <!-- Header bar with trail selector dropdown -->
      <div class="map-view-header">
        <div class="container">
          <div class="trail-selector" id="trail-selector">
            <button class="trail-selector-btn" id="trail-selector-btn" type="button">
              <span id="map-trail-name">Select Trail</span>
              <span class="trail-selector-arrow">&#9662;</span>
            </button>
            <div class="trail-selector-menu hidden" id="trail-selector-menu">
              <div id="trail-selector-list"></div>
              <div class="trail-selector-sep"></div>
              <button class="trail-selector-item" id="trail-selector-dashboard" type="button">Dashboard</button>
              <a class="trail-selector-item trail-selector-home" href="/index.html">&#8592; Home</a>
            </div>
          </div>
        </div>
      </div>

      <!-- Trail + progress summary panel -->
      <div id="trail-info" class="trail-info-panel">
        <div class="container">
          <div class="trail-info-grid">

            <div class="trail-info-section">
              <div class="trail-info-heading">Trail</div>
              <div class="trail-stat">
                <span class="trail-stat-label">Total distance</span>
                <span class="trail-stat-value" id="info-total-miles">—</span>
              </div>
              <div class="trail-stat">
                <span class="trail-stat-label">States</span>
                <span class="trail-stat-value" id="info-states">—</span>
              </div>
              <div class="trail-stat">
                <span class="trail-stat-label">Start</span>
                <span class="trail-stat-value" id="info-start">—</span>
              </div>
              <div class="trail-stat">
                <span class="trail-stat-label">End</span>
                <span class="trail-stat-value" id="info-end">—</span>
              </div>
            </div>

            <div class="trail-info-divider"></div>

            <div class="trail-info-section">
              <div class="trail-info-heading">Your Progress</div>
              <div class="trail-stat">
                <span class="trail-stat-label">Distance hiked</span>
                <span class="trail-stat-value" id="info-hiked">—</span>
              </div>
              <div class="trail-stat">
                <span class="trail-stat-label">Complete</span>
                <span class="trail-stat-value" id="info-pct">—</span>
              </div>
              <div class="trail-stat">
                <span class="trail-stat-label">Hiking sessions</span>
                <span class="trail-stat-value" id="info-sessions">—</span>
              </div>
              <div class="trail-stat">
                <span class="trail-stat-label">Trail days</span>
                <span class="trail-stat-value" id="info-days">—</span>
              </div>
              <div class="trail-stat">
                <span class="trail-stat-label">First hike</span>
                <span class="trail-stat-value" id="info-first">—</span>
              </div>
              <div class="trail-stat">
                <span class="trail-stat-label">Most recent</span>
                <span class="trail-stat-value" id="info-last">—</span>
              </div>
            </div>

          </div>
        </div>
      </div><!-- #trail-info -->

      <!-- Map, constrained to container width to align with the header logo -->
      <div class="map-outer">
        <div class="container map-container">
          <div class="select-status-bar hidden" id="select-status-bar">
            <span id="select-status-text"></span>
            <button class="select-cancel-btn" id="select-cancel-btn" type="button">Cancel</button>
          </div>
          <div id="map"></div>
          <button class="track-segment-fab" id="track-segment-btn" type="button">
            + Track a Segment
          </button>
        </div>
      </div>

    </div><!-- #map-view -->

  </div><!-- #app-shell -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/trails.js"></script>
  <script src="/js/map.js"></script>
  <script src="/js/app.js"></script>
  <script>
    (async function () {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/auth.html'; return; }

      const { data: profile } = await sb.from('profiles')
        .select('username')
        .eq('id', session.user.id)
        .single();
      if (!profile?.username) { window.location.href = '/auth.html'; return; }

      document.getElementById('username-label').textContent = profile.username;
      document.getElementById('app-loading').classList.add('hidden');
      document.getElementById('app-shell').classList.remove('hidden');

      await initApp(session.user);
    }());

    document.getElementById('signout-btn').addEventListener('click', signOut);
  </script>

  <!-- Segment drawer — slides up after both map points are selected -->
  <div class="segment-drawer hidden" id="segment-drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <div class="drawer-title">Track a Segment</div>
      <button class="drawer-close-btn" id="drawer-close-btn" type="button" aria-label="Close">&#10005;</button>
    </div>
    <div class="drawer-summary" id="drawer-segment-summary"></div>
    <div class="form-error hidden" id="drawer-error"></div>
    <form id="drawer-form" novalidate>
      <div class="drawer-row">
        <div class="form-group">
          <label for="drawer-date-begun">Date begun <span class="required-star">*</span></label>
          <input type="date" id="drawer-date-begun" required>
        </div>
        <div class="form-group">
          <label for="drawer-date-completed">Date completed</label>
          <input type="date" id="drawer-date-completed">
        </div>
      </div>
      <div class="form-group">
        <label>Duration</label>
        <div class="duration-input-row">
          <input type="number" id="drawer-duration-val" min="1" max="9999" placeholder="e.g. 3">
          <select id="drawer-duration-unit">
            <option value="minutes">Minutes</option>
            <option value="hours" selected>Hours</option>
            <option value="days">Days</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="drawer-notes">Notes</label>
        <textarea id="drawer-notes" rows="3" placeholder="Trail conditions, highlights, gear…"></textarea>
      </div>
      <div class="form-group">
        <label>Flora / fauna</label>
        <div class="tag-input-wrap" id="flora-wrap">
          <div class="tag-list" id="flora-tag-list"></div>
          <div class="tag-input-row">
            <input type="text" id="drawer-flora-input" placeholder="Add an entry…" autocomplete="off">
            <button type="button" class="tag-add-btn" id="flora-add-btn">Add</button>
          </div>
        </div>
      </div>
      <div class="drawer-actions">
        <button type="button" class="btn btn-outline" id="drawer-cancel-btn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="drawer-save-btn">Save</button>
      </div>
    </form>
  </div>

</body>
</html>
